<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume – Abhiram B</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        :root {
            --teal-deep: #0a6e6e;
            --teal-mid: #0d9898;
            --teal-bright: #14b8b8;
            --teal-light: #e0fafa;
            --dark: #1a3a3a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0f9f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .resume-topbar {
            background: linear-gradient(135deg, var(--teal-deep) 0%, var(--teal-mid) 55%, var(--teal-bright) 100%);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 3px 18px rgba(10, 110, 110, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            transition: background 0.18s, color 0.18s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .topbar-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
            letter-spacing: -0.2px;
        }

        .topbar-title span {
            color: #a8f0e8;
        }

        .topbar-badge {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            white-space: nowrap;
        }

        /* Action buttons */
        .topbar-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-dl-pdf {
            display: flex;
            align-items: center;
            gap: 7px;
            background: white;
            color: var(--teal-deep);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            padding: 8px 16px;
            border-radius: 9px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 2px 10px rgba(10, 110, 110, 0.2);
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .btn-dl-pdf:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(10, 110, 110, 0.3);
            color: var(--teal-deep);
        }

        .btn-dl-docx {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--dark);
            color: white;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            padding: 8px 16px;
            border-radius: 9px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            white-space: nowrap;
        }

        .btn-dl-docx:hover {
            opacity: 0.88;
            transform: translateY(-1px);
            color: white;
        }

        /* ── Resume viewer ── */
        .resume-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 40px;
        }

        .resume-note {
            width: 100%;
            max-width: 900px;
            background: white;
            border-left: 4px solid var(--teal-bright);
            border-radius: 0 10px 10px 0;
            padding: 12px 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #4a6a6a;
            box-shadow: 0 2px 8px rgba(10, 110, 110, 0.07);
        }

        .resume-note i {
            color: var(--teal-mid);
            font-size: 16px;
            flex-shrink: 0;
        }

        /* Image-based resume */
        .resume-img-card {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(10, 110, 110, 0.06), 0 16px 48px rgba(10, 110, 110, 0.12);
            overflow: hidden;
            border: 1px solid rgba(14, 184, 184, 0.15);
        }

        .resume-img-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* PDF embed (shown when browser supports it) */
        .resume-pdf-embed {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(10, 110, 110, 0.06), 0 16px 48px rgba(10, 110, 110, 0.12);
            overflow: hidden;
            border: 1px solid rgba(14, 184, 184, 0.15);
            display: none;
            /* toggled by JS if PDF available */
        }

        .resume-pdf-embed iframe {
            width: 100%;
            border: none;
            display: block;
            /* height set by JS based on viewport */
        }

        /* ── View toggle ── */
        .view-toggle {
            width: 100%;
            max-width: 900px;
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: flex-end;
        }

        .toggle-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 8px;
            border: 1.5px solid var(--teal-bright);
            background: white;
            color: var(--teal-deep);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s, color 0.18s;
        }

        .toggle-btn.active,
        .toggle-btn:hover {
            background: var(--teal-bright);
            color: white;
        }

        /* ── Footer strip ── */
        .resume-footer {
            background: white;
            border-top: 1px solid rgba(14, 184, 184, 0.2);
            padding: 16px 24px;
            text-align: center;
            font-size: 0.8rem;
            color: #6a9a9a;
        }

        .resume-footer a {
            color: var(--teal-mid);
            text-decoration: none;
            font-weight: 600;
        }

        .resume-footer a:hover {
            text-decoration: underline;
        }

        /* ── Responsive tweaks ── */
        @media (max-width: 576px) {
            .topbar-title {
                font-size: 0.95rem;
            }

            .topbar-badge {
                display: none;
            }

            .btn-dl-pdf,
            .btn-dl-docx {
                font-size: 0.78rem;
                padding: 7px 12px;
            }

            .resume-wrapper {
                padding: 16px 8px 32px;
            }
        }
    </style>
</head>

<body>

    <!-- ── Top bar ── -->
    <div class="resume-topbar">
        <div class="topbar-left">
            <a href="index.html" class="back-btn">
                <i class="fa fa-arrow-left"></i> Back
            </a>
            <span class="topbar-title">Abhiram <span>B</span> — Resume</span>
            <span class="topbar-badge">Last updated Jan 2026</span>
        </div>
        <div class="topbar-actions">
            <!-- PDF download -->
            <a href="Resources/CV/resume.pdf" download="Abhiram_Bency_Resume.pdf"
                onclick="return confirm('Download Abhiram\'s Resume as PDF?');" class="btn-dl-pdf">
                <i class="fa fa-file-pdf-o"></i> Download PDF
            </a>
            <!-- DOCX download (original) -->
            <a href="Resources/CV/resume.pdf" download="Abhiram_Bency_Resume.docx"
                onclick="return confirm('Download Abhiram\'s Resume as DOCX?');" class="btn-dl-docx">
                <i class="fa fa-file-word-o"></i> Download DOCX
            </a>
        </div>
    </div>

    <!-- ═══════ Resume area ═══════ -->
    <div class="resume-wrapper">

        <!-- Info note -->
        <div class="resume-note">
            <i class="fa fa-info-circle"></i>
            <span>You're viewing <strong>Abhiram B's</strong> resume. Use the buttons above to download a copy. For
                queries, <a href="contact.html" style="color:var(--teal-mid);font-weight:600;">get in touch</a>.</span>
        </div>

        <!-- View toggle -->
        <div class="view-toggle">
            <button class="toggle-btn active" id="btnImg" onclick="showImage()">
                <i class="fa fa-image"></i> Image View
            </button>
            <button class="toggle-btn" id="btnPdf" onclick="showPdf()">
                <i class="fa fa-file-pdf-o"></i> PDF View
            </button>
        </div>

        <!-- Image view (default) -->
        <div class="resume-img-card" id="imgView">
            <img src="Resources/CV/resume.jpg" alt="Abhiram B Resume">
        </div>

        <!-- PDF embed view -->
        <div class="resume-pdf-embed" id="pdfView">
            <iframe id="pdfFrame" src="Resources/CV/resume.pdf" title="Abhiram B Resume PDF"></iframe>
        </div>

    </div>

    <!-- ── Footer ── -->
    <div class="resume-footer">
        © Abhiram B &nbsp;·&nbsp;
        <a href="index.html"><i class="fa fa-home"></i> Home</a> &nbsp;·&nbsp;
        <a href="contact.html"><i class="fa fa-envelope"></i> Contact</a> &nbsp;·&nbsp;
        <a href="projects.html"><i class="fa fa-code"></i> Projects</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        const imgView = document.getElementById('imgView');
        const pdfView = document.getElementById('pdfView');
        const pdfFrame = document.getElementById('pdfFrame');
        const btnImg = document.getElementById('btnImg');
        const btnPdf = document.getElementById('btnPdf');

        // Set PDF iframe height to fill the viewport nicely
        function setPdfHeight() {
            pdfFrame.style.height = (window.innerHeight - 140) + 'px';
        }
        window.addEventListener('resize', setPdfHeight);
        setPdfHeight();

        function showImage() {
            imgView.style.display = 'block';
            pdfView.style.display = 'none';
            btnImg.classList.add('active');
            btnPdf.classList.remove('active');
        }

        function showPdf() {
            // Lazy-load the PDF only when first requested
            if (!pdfFrame.src || pdfFrame.src === window.location.href) {
                pdfFrame.src = 'Resources/CV/resume.pdf';
            }
            imgView.style.display = 'none';
            pdfView.style.display = 'block';
            btnImg.classList.remove('active');
            btnPdf.classList.add('active');
        }
    </script>

</body>

</html>
